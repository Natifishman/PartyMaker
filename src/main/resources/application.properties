# Server Configuration
server.port=8081
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.whitelabel.enabled=false

# Spring Configuration
spring.application.name=PartyMaker-Spring-Server

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Sentry Configuration
sentry.dsn=https://your-sentry-dsn@sentry.io/12345
sentry.traces-sample-rate=0.1

# Firebase Configuration
firebase.database.url=https://partymaker-9c966-default-rtdb.firebaseio.com
firebase.storage.bucket=partymaker-9c966 