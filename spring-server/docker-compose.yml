version: '3.8'

services:
  partymaker-spring-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: partymaker-spring-server
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
      - FIREBASE_DATABASE_URL=https://partymaker-app.firebaseio.com
      - FIREBASE_STORAGE_BUCKET=partymaker-app.appspot.com
      - SENTRY_DSN=
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 